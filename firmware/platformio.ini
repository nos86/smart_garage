[platformio]
description = smart_garage firmware
default_envs = rp2040

[env:rp2040]
; earlephilhower Arduino-Pico core via the maxgerhardt platform fork: the
; upstream "raspberrypi" platform ships the deprecated mbed core, whose
; bundled pico-sdk is too old for current Adafruit NeoPixel releases. This
; fork has no RP2040-Tiny board definition, but the RP2040-Zero one matches
; it electrically (same RP2040, 2MB flash, WS2812 on GP16).
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
board_build.core = earlephilhower
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.3
    robtillaart/ANSI@^0.3.5
    autowp/autowp-mcp2515@^1.3.1
; deep+: the vendored CANopenNode library (lib/CANopenNode) is included via
; subpath headers like "301/CO_driver.h", which the default "chain" LDF mode
; is not guaranteed to resolve correctly across every translation unit.
lib_ldf_mode = deep+
; -I include: PlatformIO does not propagate the project include/ dir to the
; libraries under lib/, which include hal/pins.h and hal/logic/*. build_flags
; (unlike build_src_flags) applies to library builds too.
; PIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS enables the FreeRTOS SMP port bundled
; with the arduino-pico core (per its docs/freertos.rst).
; -I src/app/canopen: the vendored CANopenNode library's 301/CO_driver.h
; does `#include "CO_driver_target.h"` (bare filename, no subpath) expecting
; the *application* to provide that file on the include path -- same reason
; "-I include" exists above, just for a different consumer.
build_flags =
    -I include
    -I src/app/canopen
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
; Warnings only on our own sources -- applied globally they drown the output
; in framework/pico-sdk noise.
build_src_flags =
    -Wall
    -Wextra

; Host-side unit tests for the hardware-independent HAL logic (debounce,
; ultrasonic distance conversion, DIP decoding). Runs on the dev machine, no
; board/upload required: `pio test -e native`.
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
